services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: newlightemara
      POSTGRES_USER: newlightemara
      POSTGRES_PASSWORD: newlightemara
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  web:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://newlightemara:newlightemara@db:5432/newlightemara
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: >
      sh -c "python manage.py migrate && python manage.py seed_demo_data --noinput && gunicorn newlightemara.wsgi:application --bind 0.0.0.0:8000"
volumes:
  postgres_data:
